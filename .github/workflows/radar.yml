name: RADAR - Monitoreo de prensa global

on:
  schedule:
    # Matutino: 7:00 VET = 11:00 UTC
    - cron: '0 11 * * *'
    # Vespertino: 17:00 VET = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      corte:
        description: 'Tipo de corte'
        required: true
        default: 'MATUTINO'
        type: choice
        options:
        - MATUTINO
        - VESPERTINO

jobs:
  execute-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # Necesario para push a rama datos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config --global user.name "Morfe Engineer"
          git config --global user.email "morfefloresm@uvm.edu.ve"

      - name: Ensure rama datos exists
        run: |
          if ! git ls-remote --exit-code origin datos; then
            git checkout --orphan datos
            git commit --allow-empty -m "Initial datos branch"
            git push origin datos
            git checkout main
          fi

      - name: Determine corte type
        id: corte
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "corte=${{ github.event.inputs.corte }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 10 ] && [ "$HOUR" -lt 13 ]; then
              echo "corte=MATUTINO" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge 20 ] && [ "$HOUR" -lt 23 ]; then
              echo "corte=VESPERTINO" >> $GITHUB_OUTPUT
            else
              echo "corte=MATUTINO" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Execute RADAR pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py --corte ${{ steps.corte.outputs.corte }}

      - name: Publicar informe en GitHub Pages
        run: |
          if [ -f docs/index.html ]; then
            git add docs/index.html
            git commit -m "radar: informe $(date -u +%Y%m%dT%H%M) [${{ steps.corte.outputs.corte }}]"
            git push origin main
          else
            echo "docs/index.html no encontrado, saltando publicación"
          fi

      - name: Push rama datos al remoto
        run: |
          # guardar_salida() ya hizo commit local en rama datos.
          # Este paso solo hace el push al remoto.
          git push origin datos
