name: RADAR - Monitoreo de prensa global

on:
  schedule:
    # Matutino: 7:00 VET = 11:00 UTC
    - cron: '0 11 * * *'
    # Vespertino: 17:00 VET = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      corte:
        description: 'Tipo de corte'
        required: true
        default: 'MATUTINO'
        type: choice
        options:
        - MATUTINO
        - VESPERTINO

jobs:
  execute-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine corte type
        id: corte
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "corte=${{ github.event.inputs.corte }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" -ge 10 ] && [ "$HOUR" -lt 13 ]; then
              echo "corte=MATUTINO" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -ge 20 ] && [ "$HOUR" -lt 23 ]; then
              echo "corte=VESPERTINO" >> $GITHUB_OUTPUT
            else
              echo "corte=MATUTINO" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Execute RADAR pipeline
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python main.py --corte ${{ steps.corte.outputs.corte }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: radar-output-${{ steps.corte.outputs.corte }}
          path: |
            output/
            *.csv
            *.json

      - name: Commit to datos branch
        if: success()
        run: |
          git config --global user.name "Morfe Engineer"
          git config --global user.email "morfefloresm@uvm.edu.ve"
          
          # Create datos branch if it doesn't exist
          git fetch origin datos || true
          if ! git rev-parse --verify origin/datos >/dev/null 2>&1; then
            git checkout --orphan datos
            git commit --allow-empty -m "Initial datos branch"
            git push origin datos
            git checkout main
          fi
          
          # Checkout datos branch
          git checkout datos || git checkout -b datos
          
          # Copy output files
          mkdir -p datos
          cp -r output/* datos/ 2>/dev/null || true
          cp *.csv datos/ 2>/dev/null || true
          cp *.json datos/ 2>/dev/null || true
          
          # Commit
          git add datos/
          git commit -m "Datos del corte ${{ steps.corte.outputs.corte }} $(date -u +%Y-%m-%dT%H:%M:%SZ)" || true
          git push origin datos || true
